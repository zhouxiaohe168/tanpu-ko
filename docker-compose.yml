services:
  postgres:
    image: postgres:15
    container_name: tanpu-postgres
    environment:
      POSTGRES_DB: tanpu
      POSTGRES_USER: tanpu
      POSTGRES_PASSWORD: tanpu123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tanpu-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: